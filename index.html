<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدرسة سردا الأساسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #bfe3f7 0%, #d4eed0 55%, #e9f7df 100%);
      color: #3b3326; padding: 24px;
    }
    .logo { font-size: 4rem; margin-bottom: 6px; }
    h1 { font-size: clamp(1.6rem, 5vw, 2.6rem); color: #b0392f;
         text-shadow: 0 2px 0 #fff, 0 4px 8px rgba(0,0,0,.12); text-align: center; }
    .sub { color: #6b7a5a; font-weight: 600; margin: 6px 0 30px; text-align: center; }
    .gate {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px; width: 100%; max-width: 620px;
    }
    .gate a {
      text-decoration: none; color: #fff; border-radius: 20px; padding: 30px 22px;
      text-align: center; border: 4px solid #d4a531;
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
      transition: transform .18s ease, box-shadow .18s ease;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .gate a:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 16px 30px rgba(0,0,0,.25); }
    .gate .icon { font-size: 3.2rem; filter: drop-shadow(0 3px 4px rgba(0,0,0,.25)); }
    .gate .title { font-size: 1.5rem; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,.35); }
    .gate .desc { font-size: .95rem; opacity: .92; text-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .card-teams { background: linear-gradient(160deg, #5b86bf, #2f4f7f); }
    .card-games { background: linear-gradient(160deg, #6fae72, #3f7d54); }
    footer { margin-top: 34px; color: #6b7a5a; font-weight: 600; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">🏫</div>
  <h1>مدرسة سردا الأساسية</h1>
  <p class="sub">اختر القسم الذي تريد الدخول إليه</p>

  <nav class="gate">
    <a href="teams/" class="card-teams">
      <span class="icon">📅</span>
      <span class="title">جدول الحصص</span>
      <span class="desc">حصص Microsoft Teams اليومية</span>
    </a>
    <a href="games/" class="card-games">
      <span class="icon">🎮</span>
      <span class="title">ألعاب المخيم</span>
      <span class="desc">تحديات وطن وهند الصيفية</span>
    </a>
  </nav>

  <footer>مدرسة سردا الأساسية المختلطة</footer>
</body>
</html>
