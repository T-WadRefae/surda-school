<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحديات وطن وهند – مخيم سردا الصيفي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== سحب وسماء ===== -->
  <div class="clouds" aria-hidden="true">
    <span class="cloud cloud-1">☁️</span>
    <span class="cloud cloud-2">☁️</span>
    <span class="cloud cloud-3">☁️</span>
  </div>

  <!-- ===== الأرض / الحديقة ===== -->
  <div class="ground" aria-hidden="true">
    <span class="plant p1">🌳</span>
    <span class="plant p2">🌷</span>
    <span class="plant p3">🌿</span>
    <span class="plant p4">🌻</span>
    <span class="plant p5">🌳</span>
    <span class="plant p6">🌸</span>
  </div>

  <main class="stage">

    <!-- ===== العنوان ===== -->
    <header class="hero-head">
      <p class="school-name">مدرسة سردا الأساسية</p>
      <h1 class="main-title">تحديات وطن وهند</h1>
      <span class="sun" aria-hidden="true">🌞</span>
    </header>

    <!-- ===== المنطقة الرئيسية ===== -->
    <div class="hero-row">

      <!-- وطن (يسار) -->
      <div class="hero-char hero-left">
        <img src="images/watan.png" alt="وطن" />
        <span class="char-name">وطن</span>
      </div>

      <!-- البطاقات -->
      <section class="cards" id="cards">
        <!-- تُملأ بـ JavaScript -->
        <div class="cards-loading">جارٍ تحميل الألعاب…</div>
      </section>

      <!-- هند (يمين) -->
      <div class="hero-char hero-right">
        <img src="images/hind.png" alt="هند" />
        <span class="char-name">هند</span>
      </div>

    </div>
  </main>

  <footer class="site-foot">
    مخيم سردا الصيفي &mdash; مدرسة سردا الأساسية
  </footer>

  <script src="games.js"></script>
  <script src="script.js"></script>
</body>
</html>
